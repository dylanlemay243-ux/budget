name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Scaffold new React Native project
        run: |
          npx @react-native-community/cli@12.3.7 init BudgetTracker --version 0.73.6 --skip-install
          cd BudgetTracker
          npm install

      - name: Copy our App.tsx
        run: |
          set -e
          # Find our App.tsx anywhere in the repo (handles the file living in a
          # subfolder), excluding the freshly scaffolded project and node_modules.
          SRC="$(find "$GITHUB_WORKSPACE" -maxdepth 3 -name App.tsx \
                   -not -path '*/BudgetTracker/*' -not -path '*/node_modules/*' \
                   -print -quit)"
          if [ -z "$SRC" ]; then
            echo "::error::Could not find App.tsx anywhere in the repository."
            echo "Top-level repository contents:"; ls -la "$GITHUB_WORKSPACE"
            exit 1
          fi
          echo "Using App.tsx from: $SRC"
          cp "$SRC" "$GITHUB_WORKSPACE/BudgetTracker/App.tsx"

      - name: Install extra dependencies
        working-directory: BudgetTracker
        run: |
          npm install @react-native-async-storage/async-storage@1.21.0 react-native-calendars

      - name: Make gradlew executable
        run: chmod +x BudgetTracker/android/gradlew

      - name: Bundle React Native JS
        working-directory: BudgetTracker
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build debug APK
        working-directory: BudgetTracker/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BudgetTracker-debug-apk
          path: BudgetTracker/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
