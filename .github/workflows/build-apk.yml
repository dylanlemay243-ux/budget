name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install React Native CLI
        run: npm install -g react-native-cli @react-native-community/cli

      - name: Scaffold new React Native project
        run: |
          npx @react-native-community/cli init BudgetTracker --version 0.73.6 --skip-install
          cd BudgetTracker
          npm install

      - name: Copy our App.tsx over the default one
        run: cp App.tsx BudgetTracker/App.tsx

      - name: Install extra dependencies
        working-directory: BudgetTracker
        run: |
          npm install @react-native-async-storage/async-storage react-native-calendars

      - name: Generate debug keystore
        working-directory: BudgetTracker/android/app
        run: |
          keytool -genkeypair \
            -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug, O=Android, C=US"

      - name: Make gradlew executable
        run: chmod +x BudgetTracker/android/gradlew

      - name: Bundle React Native JS
        working-directory: BudgetTracker
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build debug APK
        working-directory: BudgetTracker/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BudgetTracker-debug-apk
          path: BudgetTracker/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
